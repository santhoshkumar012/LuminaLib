version: "3.9"

services:

  api:
    build: .
    container_name: luminalib_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis
      - ollama

    volumes:
      - .:/app

  db:
    image: postgres:16

    container_name: luminalib_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luminalib

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: luminalib_redis

    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama

    container_name: luminalib_ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: